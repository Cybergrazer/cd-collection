<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CD Collection Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --bg-main: #232323;
            --bg-light: #3a3a3a;
            --bg-dark: #1a1a1a;
            --text-light: #f0f0f0;
            --text-med: #bbb;
            --accent: #0088cc;
            --gold: #ffd700;
            --red: #c33;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
            line-height: 1.4;
        }
        h2, h3 { border-bottom: 2px solid var(--accent); padding-bottom: 5px; color: var(--text-light); margin-top: 10px; }
        h3 { font-size: 1.1em; color: var(--gold); }
        
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            margin: 0 5px 8px 0;
            font-weight: 500;
            touch-action: manipulation;
            transition: background 0.2s;
        }
        button:hover { background: #0099e6; }
        button:active { filter: brightness(1.2); }
        button:disabled { background: #555; opacity: 0.6; }
        button.danger { background: var(--red); }
        button.needs-save { background: var(--gold); color: var(--bg-dark); font-weight: bold; }

        input[type="text"], input[type="url"] {
            background: var(--bg-light);
            color: var(--text-light);
            border: 1px solid #555;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px; 
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .container { max-width: 1400px; margin: auto; }
        .panel { background: var(--bg-dark); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        
        #status { font-size: 0.95em; color: var(--gold); min-height: 1.2em; margin-top: 5px; font-weight: bold; }
        
        .main-layout { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 900px) {
            .main-layout { flex-direction: row; align-items: flex-start; }
            #albumGrid { flex: 3; }
            #trackSidebar { flex: 1; position: sticky; top: 15px; max-height: 90vh; }
        }

        #albumGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            background: var(--bg-dark);
            padding: 15px;
            border-radius: 8px;
            min-height: 400px;
        }

        .album-card {
            background: var(--bg-light);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transition: transform 0.1s;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .album-card.selected { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .album-card img { width: 100%; height: 150px; object-fit: cover; background: #444; display: block; }

        .delete-icon {
            position: absolute;
            top: 5px; left: 5px; z-index: 10;
            fill: var(--text-med); width: 20px; height: 20px;
            padding: 4px; background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            transition: all 0.2s;
        }
        .delete-icon:hover { fill: var(--red); transform: scale(1.1); background: rgba(0, 0, 0, 0.6); }

        .card-line { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px; min-height: 28px; }
        .card-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.85em; }
        .title-text { font-weight: bold; }
        .artist-text { color: var(--text-med); }
        .card-link { margin-left: 5px; display: flex; align-items: center; text-decoration: none; }
        .card-logo { width: 16px; height: 16px; fill: var(--text-med); transition: fill 0.2s; }
        .card-link:hover .card-logo { fill: var(--accent); }

        #trackSidebar {
            background: var(--bg-dark);
            padding: 20px;
            border-radius: 8px;
            overflow-y: auto;
        }
        #trackSidebar ol { padding-left: 20px; margin: 15px 0; }
        #trackSidebar li { padding: 3px 0; color: var(--text-med); font-size: 0.9em; }

        .wiki-container { margin-top: 20px; padding: 15px; background: white; color: black; border-radius: 8px; }
        .wiki-header { display: flex; align-items: center; gap: 10px; }
        .wiki-logo { width: 32px; height: 32px; }
        .wiki-title { font-family: Georgia, serif; font-size: 1.2em; font-weight: bold; color: black; }
        .wiki-link { display: block; text-align: center; margin-top: 10px; font-size: 0.85em; color: var(--accent); text-decoration: none; font-weight: bold; }

        #az-breadcrumb { display: flex; flex-wrap: wrap; gap: 4px; padding-top: 10px; }
        .az-letter { background: var(--bg-light); color: var(--text-light); padding: 8px 12px; border-radius: 4px; font-size: 0.85em; font-weight: bold; cursor: pointer; user-select: none; }
        .az-letter:hover { background: var(--accent); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: var(--bg-light); padding: 25px; border-radius: 12px; width: 95%; max-width: 700px; max-height: 85vh; overflow-y: auto; position: relative; }
    </style>
</head>
<body>

    <div class="container">
        <h2>CD Collection Manager</h2>

        <div class="panel">
            <h3>Google Sheet Integration</h3>
            <div class="panel-row">
                <label for="sheetUrl" style="display:block; margin-bottom:5px; font-size:0.9em; opacity:0.8;">Public TSV Link:</label>
                <input type="url" id="sheetUrl" placeholder="Paste link here (pub?output=tsv)...">
            </div>
            <button id="syncBtn" onclick="app.syncFromSheet()" style="width: 100%;">Sync Now</button>
            <div id="status">Ready.</div>
        </div>

        <div class="panel">
            <h3>Add & Manage</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="barcodeInput" placeholder="Barcode..." style="flex: 2;">
                <button onclick="app.barcodeSearch()" style="flex: 1;">Scan</button>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="artistInput" placeholder="Artist..." style="flex: 1;">
                <input type="text" id="albumInput" placeholder="Album..." style="flex: 1;">
            </div>
            <button onclick="app.manualSearch()" style="width: 100%;">Add / Search Artist</button>
            
            <div style="margin-top:15px; border-top: 1px solid #444; padding-top: 15px; display: flex; flex-wrap: wrap; gap: 5px;">
                <button id="exportBtn" onclick="app.exportDB()">Export JSON</button>
                <button onclick="document.getElementById('jsonInput').click()">Import JSON</button>
                <button id="updateImageBtn" onclick="app.showImageUpdater()" disabled>Change Image</button>
                <button id="deleteBtn" class="danger" onclick="app.deleteCurrentAlbum()" disabled>Delete</button>
                <button onclick="app.resetApp()" class="danger">Reset Phone Cache</button>
            </div>
        </div>

        <div class="panel">
            <h3>Artist A-Z <span id="albumCountTotal" style="float: right; font-weight: normal; opacity: 0.7;">0</span></h3>
            <div id="az-breadcrumb"></div>
        </div>

        <div class="main-layout">
            <div id="albumGrid"></div>
            <div id="trackSidebar">
                <h3>Details</h3>
                <p>Select an album to see tracks.</p>
            </div>
        </div>
    </div>

    <input type="file" id="jsonInput" accept=".json" onchange="app.handleJSONUpload(event)">

    <!-- Modals -->
    <div id="imageModal" class="modal-overlay">
        <div class="modal-content">
            <button class="danger" onclick="app.closeModals()">Close</button>
            <h3 style="margin-top:15px;">Change Cover Art</h3>
            <div id="modalImageGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:15px; margin-top:15px;"></div>
        </div>
    </div>

    <div id="albumSelectModal" class="modal-overlay">
        <div class="modal-content">
            <button class="danger" onclick="app.closeModals()">Close</button>
            <h3 id="albumSelectTitle" style="margin-top:15px;">Select Album</h3>
            <div id="modalAlbumList" style="display:flex; flex-direction:column; gap:10px; margin-top:15px;"></div>
        </div>
    </div>

<script>
// --- API LAYER ---
const api = {
    delay: 1100,
    queue: [],
    busy: false,

    async fetch(url, opt = {}) {
        return new Promise((res, rej) => {
            this.queue.push({ url, opt, res, rej });
            if (!this.busy) this.next();
        });
    },

    async next() {
        if (!this.queue.length) { this.busy = false; return; }
        this.busy = true;
        const { url, opt, res, rej } = this.queue.shift();
        try {
            const r = await fetch(url, opt);
            res(r);
        } catch (e) { rej(e); }
        setTimeout(() => this.next(), this.delay);
    }
};

// --- APP LOGIC ---
const app = {
    db: [],
    selectedIdx: -1,
    isDirty: false,

    init() {
        this.renderAZ();
        this.loadLocal();
        this.renderGrid();
        
        document.getElementById('sheetUrl').addEventListener('input', (e) => {
            let val = e.target.value.trim();
            if (val.includes('/pubhtml')) val = val.replace('/pubhtml', '/pub?output=tsv');
            localStorage.setItem('cd_sheet_url_v5', val);
        });

        window.addEventListener('beforeunload', (e) => {
            if (this.isDirty) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    },

    loadLocal() {
        const d = localStorage.getItem('cd_db_v5');
        if (d) this.db = JSON.parse(d);
        const u = localStorage.getItem('cd_sheet_url_v5');
        if (u) document.getElementById('sheetUrl').value = u;
    },

    saveLocal() {
        this.db.sort((a, b) => a.artist.localeCompare(b.artist) || a.title.localeCompare(b.title));
        localStorage.setItem('cd_db_v5', JSON.stringify(this.db));
        this.isDirty = true;
        document.getElementById('exportBtn').classList.add('needs-save');
    },

    setStatus(m) { document.getElementById('status').textContent = m; },

    async syncFromSheet() {
        let url = document.getElementById('sheetUrl').value.trim();
        if (!url) return this.setStatus("Please paste your Google Sheet link first.");
        
        if (url.includes('/pubhtml')) url = url.replace('/pubhtml', '/pub?output=tsv');
        if (!url.includes('output=tsv')) url += (url.includes('?') ? '&' : '?') + 'output=tsv';
        document.getElementById('sheetUrl').value = url;

        this.setStatus("Connecting to Google Sheets...");
        document.getElementById('syncBtn').disabled = true;

        try {
            const r = await fetch(url, { cache: "no-cache", mode: "cors" });
            if (!r.ok) throw new Error("Could not reach sheet. Check 'Publish to web' settings.");
            
            const txt = await r.text();
            const lines = txt.split(/\r?\n/).filter(l => l.trim());
            
            let row = lines[0].split('\t');
            let ai = row.indexOf("Artist"), bi = row.indexOf("Album"), start = 1;
            if (ai === -1) { row = lines[1].split('\t'); ai = row.indexOf("Artist"); bi = row.indexOf("Album"); start = 2; }

            if (ai === -1) throw new Error("Header row not found.");

            const newAlbums = [];
            for (let i = start; i < lines.length; i++) {
                const col = lines[i].split('\t');
                const art = col[ai]?.trim(), alb = col[bi]?.trim();
                if (art && alb && !this.db.some(x => x.artist.toLowerCase() === art.toLowerCase() && x.title.toLowerCase() === alb.toLowerCase())) {
                    newAlbums.push({ art, alb });
                }
            }

            if (!newAlbums.length) {
                this.setStatus("Sync finished. Collection is already up to date.");
            } else {
                this.setStatus(`Found ${newAlbums.length} new CDs. Fetching info...`);
                for (let i = 0; i < newAlbums.length; i++) {
                    this.setStatus(`Syncing ${i+1}/${newAlbums.length}: ${newAlbums[i].alb}`);
                    await this.addAlbum(newAlbums[i].art, newAlbums[i].alb);
                }
                this.setStatus("Sheet synchronization complete!");
            }
        } catch (e) {
            this.setStatus("Error: " + e.message);
        }
        document.getElementById('syncBtn').disabled = false;
    },

    async addAlbum(artist, title) {
        try {
            const q = `release:"${encodeURIComponent(title)}" AND artist:"${encodeURIComponent(artist)}"`;
            const r = await api.fetch(`https://musicbrainz.org/ws/2/release/?query=${q}&fmt=json&limit=1`);
            const d = await r.json();
            if (!d.releases?.length) return false;
            
            const rel = d.releases[0];
            const id = rel.id;
            
            const tr = await api.fetch(`https://musicbrainz.org/ws/2/release/${id}?inc=recordings&fmt=json`);
            const td = await tr.json();
            const tracks = td.media?.[0]?.tracks?.map(t => ({ title: t.title })) || [];

            let img = `https://coverartarchive.org/release/${id}/front`;
            const check = await api.fetch(img, { method: 'HEAD' });
            if (!check.ok && check.status !== 307) {
                const it = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist+' '+title)}&entity=album&limit=1`);
                const idat = await it.json();
                img = idat.results?.[0]?.artworkUrl100?.replace('100x100', '600x600') || null;
            }

            this.db.push({
                artist: rel['artist-credit'][0].name,
                title: rel.title,
                date: rel.date,
                img, id, tracks
            });
            
            this.saveLocal();
            this.renderGrid();
            return true;
        } catch (e) { return false; }
    },

    renderGrid() {
        document.getElementById('albumCountTotal').textContent = this.db.length;
        const g = document.getElementById('albumGrid');
        g.innerHTML = '';
        this.db.forEach((a, i) => {
            const div = document.createElement('div');
            div.className = `album-card ${i === this.selectedIdx ? 'selected' : ''}`;
            div.onclick = () => { this.selectedIdx = i; this.renderGrid(); this.renderSidebar(); };
            
            const tUrl = `https://tidal.com/search?q=${encodeURIComponent(a.artist + ' ' + a.title)}&type=albums`;
            const aUrl = `https://music.amazon.com/search/${encodeURIComponent(a.artist + ' ' + a.title)}`;

            div.innerHTML = `
                <div class="delete-icon" onclick="event.stopPropagation(); app.deleteAlbum(${i})">
                    <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                </div>
                <img src="${a.img || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'}">
                <div class="card-line">
                    <span class="card-text title-text">${a.title}</span>
                    <a href="${tUrl}" target="_blank" class="card-link" onclick="event.stopPropagation()">
                        <svg class="card-logo" viewBox="0 0 24 24"><path d="M12 2L7 7l5 5 5-5-5-5zM7 17l5 5 5-5-5-5-5 5zM2 12l5 5 5-5-5-5-5 5zM17 12l5 5 5-5-5-5-5 5z"/></svg>
                    </a>
                </div>
                <div class="card-line">
                    <span class="card-text artist-text">${a.artist}</span>
                    <a href="${aUrl}" target="_blank" class="card-link" onclick="event.stopPropagation()">
                        <svg class="card-logo" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM7.5 13.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5S9.83 12 9 12s-1.5.67-1.5 1.5zm9 0c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5-.67-1.5-1.5-1.5-1.5.67-1.5 1.5zm-4.5 1.5c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z"/></svg>
                    </a>
                </div>
            `;
            g.appendChild(div);
        });
    },

    renderSidebar() {
        const s = document.getElementById('trackSidebar');
        if (this.selectedIdx === -1) { 
            s.innerHTML = '<h3>Details</h3><p>Select an album.</p>'; 
            document.getElementById('updateImageBtn').disabled = document.getElementById('deleteBtn').disabled = true;
            return; 
        }
        const a = this.db[this.selectedIdx];
        document.getElementById('updateImageBtn').disabled = document.getElementById('deleteBtn').disabled = false;
        
        let h = `<h3>${a.title}</h3><p><b>${a.artist}</b></p><p style="font-size:0.8em; opacity:0.6;">Released: ${a.date || '----'}</p><ol>`;
        a.tracks.forEach(t => h += `<li>${t.title}</li>`);
        h += '</ol>';
        
        const wName = encodeURIComponent(a.artist.replace(/ /g, '_'));
        h += `
            <div class="wiki-container">
                <div class="wiki-header">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/Wikipedia-logo-v2.svg" class="wiki-logo">
                    <span class="wiki-title">${a.artist}</span>
                </div>
                <a href="https://en.wikipedia.org/wiki/${wName}" target="_blank" class="wiki-link">View Wikipedia Article</a>
            </div>
        `;
        s.innerHTML = h;
    },

    deleteAlbum(i) {
        if (confirm(`Remove "${this.db[i].title}"?`)) {
            this.db.splice(i, 1);
            this.selectedIdx = -1;
            this.saveLocal();
            this.renderGrid();
            this.renderSidebar();
        }
    },

    deleteCurrentAlbum() { if (this.selectedIdx > -1) this.deleteAlbum(this.selectedIdx); },

    async barcodeSearch() {
        const b = document.getElementById('barcodeInput').value.trim();
        if (!b) return;
        this.setStatus(`Searching barcode: ${b}...`);
        try {
            const r = await api.fetch(`https://musicbrainz.org/ws/2/release/?query=barcode:${b}&fmt=json`);
            const d = await r.json();
            if (d.releases?.length) {
                const rel = d.releases[0];
                await this.addAlbum(rel['artist-credit'][0].name, rel.title);
                document.getElementById('barcodeInput').value = '';
                this.setStatus("Added!");
            } else { this.setStatus("Not found."); }
        } catch (e) { this.setStatus("Search failed."); }
    },

    async manualSearch() {
        const art = document.getElementById('artistInput').value.trim();
        const alb = document.getElementById('albumInput').value.trim();
        if (!art) return;
        if (alb) {
            const success = await this.addAlbum(art, alb);
            if (success) { document.getElementById('artistInput').value = document.getElementById('albumInput').value = ''; this.setStatus("Added!"); }
            else this.setStatus("Not found.");
        } else {
            this.showPicker(art);
        }
    },

    async showPicker(name) {
        const list = document.getElementById('modalAlbumList');
        list.innerHTML = 'Searching MusicBrainz...';
        document.getElementById('albumSelectModal').style.display = 'flex';
        try {
            const r = await api.fetch(`https://musicbrainz.org/ws/2/release/?query=artist:"${encodeURIComponent(name)}" AND (type:album OR type:ep) AND status:official&fmt=json&limit=20`);
            const d = await r.json();
            list.innerHTML = '';
            if(!d.releases?.length) list.innerHTML = "No albums found.";
            d.releases?.forEach(rel => {
                const div = document.createElement('div');
                div.style = "background:#222; padding:12px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;";
                div.innerHTML = `<span><b>${rel.title}</b><br><small>${rel.date || '----'}</small></span>`;
                const btn = document.createElement('button');
                btn.textContent = "Add";
                btn.onclick = async () => { btn.disabled = true; await this.addAlbum(name, rel.title); btn.textContent = "OK"; };
                div.appendChild(btn);
                list.appendChild(div);
            });
        } catch (e) { list.innerHTML = "Error."; }
    },

    async showImageUpdater() {
        const a = this.db[this.selectedIdx];
        const g = document.getElementById('modalImageGrid');
        g.innerHTML = 'Finding images...';
        document.getElementById('imageModal').style.display = 'flex';
        
        const [caaR, itR] = await Promise.allSettled([
            api.fetch(`https://coverartarchive.org/release/${a.id}`),
            fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(a.artist + ' ' + a.title)}&entity=album&limit=8`)
        ]);
        
        const urls = new Set();
        if (caaR.status === 'fulfilled' && caaR.value.ok) {
            const caaD = await caaR.value.json();
            caaD.images.forEach(i => urls.add(i.image));
        }
        if (itR.status === 'fulfilled' && itR.value.ok) {
            const itD = await itR.value.json();
            itD.results.forEach(i => urls.add(i.artworkUrl100.replace('100x100', '1000x1000')));
        }
        
        g.innerHTML = '';
        if (!urls.size) g.innerHTML = "No other images found.";
        urls.forEach(u => {
            const item = document.createElement('div');
            item.style = "cursor:pointer; background:#222; border-radius:8px; overflow:hidden;";
            item.innerHTML = `<img src="${u}" style="width:100%; display:block;"><p id="dim_${Math.random().toString(36).substr(2, 9)}" style="font-size:0.7em; text-align:center; padding:5px; margin:0;">Loading size...</p>`;
            item.onclick = () => { a.img = u; this.saveLocal(); this.closeModals(); this.renderGrid(); };
            g.appendChild(item);
            
            const i = new Image();
            i.onload = () => {
                const p = item.querySelector('p');
                if(p) p.textContent = `${i.naturalWidth} x ${i.naturalHeight}`;
            };
            i.src = u;
        });
    },

    exportDB() {
        const blob = new Blob([JSON.stringify(this.db, null, 2)], { type: 'application/json' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = 'cd_collection.json';
        a.click();
        this.isDirty = false;
        document.getElementById('exportBtn').classList.remove('needs-save');
    },

    handleJSONUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const r = new FileReader();
        r.onload = (ev) => { 
            try {
                this.db = JSON.parse(ev.target.result); 
                this.saveLocal(); 
                this.renderGrid(); 
                this.setStatus("Import successful.");
            } catch (err) { this.setStatus("Invalid JSON file."); }
        };
        r.readAsText(file);
    },

    renderAZ() {
        const b = document.getElementById('az-breadcrumb');
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ#".split('').forEach(l => {
            const s = document.createElement('span');
            s.className = 'az-letter'; s.textContent = l;
            s.onclick = () => {
                const idx = this.db.findIndex(x => l === '#' ? !/^[A-Z]/i.test(x.artist) : x.artist.toUpperCase().startsWith(l));
                if (idx > -1) {
                    this.selectedIdx = idx;
                    this.renderGrid();
                    this.renderSidebar();
                    document.getElementById('albumGrid').children[idx].scrollIntoView({ behavior: 'smooth' });
                }
            };
            b.appendChild(s);
        });
    },

    closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); },
    resetApp() { if(confirm("Wipe phone cache?")) { localStorage.clear(); location.reload(); } }
};

window.onload = () => app.init();
</script>
</body>
</html>
