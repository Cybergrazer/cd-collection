<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CD Collection (MusicBrainz Edition)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-main: #232323;
            --bg-light: #3a3a3a;
            --bg-dark: #1a1a1a;
            --text-light: #f0f0f0;
            --text-med: #bbb;
            --accent: #0088cc;
            --gold: #ffd700;
            --red: #c33;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
        }
        h2, h3 {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 5px;
            color: var(--text-light);
        }
        h3 {
            font-size: 1.2em;
            margin-top: 0;
            color: var(--gold);
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin: 0 5px 5px 0;
            transition: background-color 0.2s, color 0.2s;
        }
        button:hover { background: #0099e6; }
        button:disabled { background: #555; cursor: not-allowed; }
        button.danger { background: var(--red); }
        button.danger:hover { background: #e64a4a; }

        button.needs-save {
            background: var(--gold);
            color: var(--bg-dark);
            font-weight: bold;
        }

        input[type="text"], input[type="url"] {
            background: var(--bg-light);
            color: var(--text-light);
            border: 1px solid #555;
            padding: 10px;
            border-radius: 5px;
            font-size: 1em;
            margin-right: 5px;
            width: calc(100% - 22px);
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        @media (min-width: 600px) {
            input[type="text"], input[type="url"] { width: auto; min-width: 300px; }
        }

        input[type="file"] { display: none; }
        .container { display: flex; flex-direction: column; gap: 20px; max-width: 1400px; margin: auto; }
        .main-layout { display: flex; flex-direction: row; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        
        #albumGrid {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            background: var(--bg-dark);
            padding: 20px;
            border-radius: 8px;
            min-height: 400px;
        }
        .album-card {
            background: var(--bg-light);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
        }
        .album-card.selected { border: 2px solid var(--gold); box-shadow: 0 0 15px var(--gold); }
        .album-card:hover { transform: translateY(-5px); }
        .album-card img { width: 100%; height: 160px; object-fit: cover; display: block; background: #555; }

        .delete-icon {
            position: absolute;
            top: 5px;
            left: 5px;
            z-index: 10;
            fill: var(--text-med);
            width: 20px;
            height: 20px;
            opacity: 0.6;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
        }
        .delete-icon:hover { fill: var(--red); transform: scale(1.1); background: rgba(0, 0, 0, 0.6); }

        .card-line { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; min-height: 24px; }
        .card-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .title-text { font-size: 0.9em; font-weight: bold; }
        .artist-text { font-size: 0.8em; color: var(--text-med); }
        .card-link { margin-left: 5px; display: flex; align-items: center; text-decoration: none; }
        .card-logo { width: 16px; height: 16px; fill: var(--text-med); transition: fill 0.2s; }
        .card-link:hover .card-logo { fill: var(--accent); }

        #trackSidebar {
            flex: 1;
            min-width: 300px;
            background: var(--bg-dark);
            padding: 20px;
            border-radius: 8px;
            overflow-y: auto;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
        }
        #trackSidebar ol { padding-left: 25px; margin: 15px 0; }
        #trackSidebar li { padding: 4px 0; color: var(--text-med); font-size: 0.95em; }

        .panel { background: var(--bg-dark); padding: 15px 20px; border-radius: 8px; }
        #status { font-size: 1.1em; margin-top: 10px; color: var(--gold); min-height: 1.2em; }
        
        #az-breadcrumb { display: flex; flex-wrap: wrap; gap: 5px; padding-top: 10px; }
        .az-letter { background: var(--bg-light); color: var(--text-light); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9em; user-select: none; }
        .az-letter:hover { background: var(--accent); color: white; }

        .wiki-container { margin-top: 20px; border-top: 1px solid var(--bg-light); padding: 15px; background: white; color: black; border-radius: 8px; }
        .wiki-header { display: flex; align-items: center; gap: 10px; }
        .wiki-logo { width: 30px; height: 30px; }
        .wiki-title { font-family: Georgia, serif; font-size: 1.3em; color: black; }
        .wiki-link { display: block; text-align: center; margin-top: 10px; font-size: 0.9em; color: var(--accent); text-decoration: none; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--bg-light); padding: 25px; border-radius: 8px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 10px; right: 15px; font-size: 2em; cursor: pointer; color: var(--text-med); }
        #modalImageGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .modal-image-item { background: var(--bg-dark); border-radius: 4px; overflow: hidden; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .modal-image-item:hover { border-color: var(--gold); }
        .modal-image-item img { width: 100%; height: 140px; object-fit: cover; }
        .modal-image-item p { font-size: 0.75em; padding: 5px; margin: 0; color: var(--text-med); }
    </style>
</head>
<body>

    <div class="container">
        <h2>CD Collection Manager</h2>

        <div class="panel">
            <h3>Google Sheet Integration</h3>
            <div class="panel-row">
                <label for="sheetUrl" style="display:block; margin-bottom:5px;">Public TSV Link:</label>
                <input type="url" id="sheetUrl" placeholder="Paste link here...">
            </div>
            <button id="syncBtn" onclick="app.syncFromSheet()">Sync Collection from Sheet</button>
            <div id="status">Ready.</div>
        </div>

        <div class="panel">
            <h3>Add & Manage</h3>
            <div style="margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                <input type="text" id="barcodeInput" placeholder="Enter barcode..." style="margin-bottom:0;">
                <button onclick="app.barcodeSearch()">Search Barcode</button>
            </div>
            <div style="margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                <input type="text" id="artistInput" placeholder="Artist" style="margin-bottom:0;">
                <input type="text" id="albumInput" placeholder="Album (leave blank for artist search)" style="margin-bottom:0;">
                <button onclick="app.manualSearch()">Add / Search</button>
            </div>
            <div>
                <button onclick="document.getElementById('jsonInput').click()">Import JSON</button>
                <button id="exportBtn" onclick="app.exportDB()">Export JSON</button>
                <button id="updateImageBtn" onclick="app.showImageUpdater()" disabled>Change Image</button>
                <button id="deleteBtn" class="danger" onclick="app.deleteCurrentAlbum()" disabled>Delete Selected</button>
                <button onclick="app.resetApp()" class="danger" style="margin-left:20px;">Clear Phone Cache</button>
            </div>
        </div>
        
        <div class="panel">
            <h3>Artist A-Z <span id="albumCountTotal" style="float: right; font-size: 0.8em; font-weight: normal;">(Total: 0)</span></h3>
            <div id="az-breadcrumb"></div>
        </div>
        
        <input type="file" id="jsonInput" accept=".json" onchange="app.handleJSONUpload(event)">

        <div class="main-layout">
            <div id="albumGrid"></div>
            <div id="trackSidebar">
                <h3>Tracklist</h3>
                <p>Select an album to view tracks and artist info.</p>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="imageModal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="app.closeModals()">&times;</span>
            <h3>Select Cover Art</h3>
            <div id="modalImageGrid"></div>
        </div>
    </div>

    <div id="albumSelectModal" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="app.closeModals()">&times;</span>
            <h3 id="albumSelectTitle">Found Albums</h3>
            <div id="modalAlbumList" style="display:flex; flex-direction:column; gap:10px; margin-top:20px;"></div>
        </div>
    </div>

<script>
const api = {
    requestQueue: [],
    isProcessing: false,
    REQUEST_DELAY: 1100,

    async throttledFetch(url, options = {}) {
        return new Promise((resolve, reject) => {
            this.requestQueue.push({ url, options, resolve, reject });
            if (!this.isProcessing) this.processQueue();
        });
    },

    async processQueue() {
        if (this.requestQueue.length === 0) { this.isProcessing = false; return; }
        this.isProcessing = true;
        const { url, options, resolve, reject } = this.requestQueue.shift();
        try {
            const response = await fetch(url, options);
            resolve(response);
        } catch (e) { reject(e); }
        setTimeout(() => this.processQueue(), this.REQUEST_DELAY);
    },

    async searchRelease(artist, title) {
        const q = `release:"${encodeURIComponent(title)}" AND artist:"${encodeURIComponent(artist)}"`;
        const r = await this.throttledFetch(`https://musicbrainz.org/ws/2/release/?query=${q}&fmt=json&limit=5`);
        return r.json();
    },

    async searchByBarcode(bc) {
        const r = await this.throttledFetch(`https://musicbrainz.org/ws/2/release/?query=barcode:${bc}&fmt=json`);
        return r.json();
    },

    async searchByArtist(name) {
        const q = `artist:"${encodeURIComponent(name)}" AND (type:album OR type:ep) AND status:official`;
        const r = await this.throttledFetch(`https://musicbrainz.org/ws/2/release/?query=${q}&fmt=json&limit=25`);
        return r.json();
    },

    async fetchDetails(id) {
        const r = await this.throttledFetch(`https://musicbrainz.org/ws/2/release/${id}?inc=recordings&fmt=json`);
        return r.json();
    },

    async fetchImages(id) {
        const r = await this.throttledFetch(`https://coverartarchive.org/release/${id}`);
        return r.ok ? r.json() : { images: [] };
    },

    async searchItunes(artist, title) {
        const term = encodeURIComponent(`${artist} ${title}`);
        const r = await fetch(`https://itunes.apple.com/search?term=${term}&entity=album&limit=5`);
        return r.ok ? r.json() : { results: [] };
    },

    async fetchCoverArtUrl(id) {
        const url = `https://coverartarchive.org/release/${id}/front`;
        try {
            const response = await this.throttledFetch(url, { method: 'HEAD' });
            return (response.ok || response.status === 307) ? url : null;
        } catch (e) { return null; }
    }
};

const app = {
    db: [],
    sheetQueue: [],
    selectedIdx: -1,
    isDirty: false,

    elements: {
        grid: document.getElementById('albumGrid'),
        sidebar: document.getElementById('trackSidebar'),
        status: document.getElementById('status'),
        sheetUrl: document.getElementById('sheetUrl'),
        barcodeInput: document.getElementById('barcodeInput'),
        artistInput: document.getElementById('artistInput'),
        albumInput: document.getElementById('albumInput'),
        exportBtn: document.getElementById('exportBtn'),
        updateImageBtn: document.getElementById('updateImageBtn'),
        deleteBtn: document.getElementById('deleteBtn'),
        imageModal: document.getElementById('imageModal'),
        albumSelectModal: document.getElementById('albumSelectModal'),
        syncBtn: document.getElementById('syncBtn')
    },

    init() {
        this.populateAZNav();
        this.loadPersistentData();
        this.renderGrid();
        this.renderSidebar();
        
        this.elements.sheetUrl.addEventListener('change', () => {
            this.validateAndSaveUrl();
        });
    },

    validateAndSaveUrl() {
        let val = this.elements.sheetUrl.value;
        if (val.includes('/pubhtml')) {
            val = val.replace('/pubhtml', '/pub?output=tsv');
            this.elements.sheetUrl.value = val;
        }
        localStorage.setItem('cd_sheet_url', val);
        return val;
    },

    loadPersistentData() {
        const savedDb = localStorage.getItem('cd_collection_v3');
        if (savedDb) this.db = JSON.parse(savedDb);
        const savedUrl = localStorage.getItem('cd_sheet_url');
        if (savedUrl) this.elements.sheetUrl.value = savedUrl;
    },

    savePersistentData() {
        localStorage.setItem('cd_collection_v3', JSON.stringify(this.db));
        this.isDirty = true;
        this.elements.exportBtn.classList.add('needs-save');
    },

    resetApp() {
        if(confirm("Wipe all local data? Make sure you have a JSON backup!")) {
            localStorage.clear();
            location.reload();
        }
    },

    setStatus(msg) { this.elements.status.textContent = msg; },

    sortDB() {
        this.db.sort((a, b) => a.artist.localeCompare(b.artist) || a.title.localeCompare(b.title));
    },

    renderGrid() {
        document.getElementById('albumCountTotal').textContent = `(Total: ${this.db.length})`;
        this.elements.grid.innerHTML = '';
        
        this.db.forEach((album, idx) => {
            const card = document.createElement('div');
            card.className = `album-card ${idx === this.selectedIdx ? 'selected' : ''}`;
            card.onclick = () => this.selectAlbum(idx);

            const del = document.createElement('div');
            del.className = 'delete-icon';
            del.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>';
            del.onclick = (e) => { e.stopPropagation(); this.deleteAlbum(idx); };
            
            const img = document.createElement('img');
            img.src = album.img || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
            
            const tLine = document.createElement('div');
            tLine.className = 'card-line';
            tLine.innerHTML = `<span class="card-text title-text">${album.title}</span>
                <a href="https://tidal.com/search?q=${encodeURIComponent(album.artist+' '+album.title)}" target="_blank" class="card-link" onclick="event.stopPropagation()">
                <svg class="card-logo" viewBox="0 0 24 24"><path d="M4 15V9h2v6H4zm3 2V7h2v10H7zm3-2V9h2v6h-2zm3 2V7h2v10h-2zm3-2V9h2v6h-2z"/></svg></a>`;

            const aLine = document.createElement('div');
            aLine.className = 'card-line';
            aLine.innerHTML = `<span class="card-text artist-text">${album.artist}</span>
                <a href="https://music.amazon.com/search/${encodeURIComponent(album.artist+' '+album.title)}" target="_blank" class="card-link" onclick="event.stopPropagation()">
                <svg class="card-logo" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></a>`;

            card.append(del, img, tLine, aLine);
            this.elements.grid.appendChild(card);
        });
    },

    renderSidebar() {
        if (this.selectedIdx === -1) {
            this.elements.sidebar.innerHTML = '<h3>Tracklist</h3><p>Select an album.</p>';
            this.elements.updateImageBtn.disabled = this.elements.deleteBtn.disabled = true;
            return;
        }
        const a = this.db[this.selectedIdx];
        this.elements.updateImageBtn.disabled = this.elements.deleteBtn.disabled = false;

        let h = `<h3>${a.title}</h3><p>${a.artist}</p><small>${a.date || ''}</small><ol>`;
        (a.tracks || []).forEach(t => h += `<li>${t.title}</li>`);
        h += '</ol>';

        const wName = encodeURIComponent(a.artist.replace(/ /g, '_'));
        h += `<div class="wiki-container"><div class="wiki-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/Wikipedia-logo-v2.svg" class="wiki-logo">
            <div class="wiki-title">${a.artist}</div></div>
            <a href="https://en.wikipedia.org/wiki/${wName}" target="_blank" class="wiki-link">View Wikipedia Article</a></div>`;
        
        this.elements.sidebar.innerHTML = h;
    },

    selectAlbum(i) { this.selectedIdx = i; this.renderGrid(); this.renderSidebar(); },

    deleteAlbum(i) {
        if(confirm(`Remove "${this.db[i].title}"?`)) {
            this.db.splice(i, 1);
            this.selectedIdx = -1;
            this.savePersistentData();
            this.renderGrid();
            this.renderSidebar();
        }
    },

    async syncFromSheet() {
        let url = this.validateAndSaveUrl();
        if (!url || !url.includes('output=tsv')) { 
            this.setStatus("Please paste a published TSV link first."); 
            return; 
        }
        
        this.elements.syncBtn.disabled = true;
        this.setStatus("Syncing sheet...");
        
        try {
            const res = await fetch(url);
            const txt = await res.text();
            const lines = txt.split(/\r?\n/).filter(l => l.trim());
            
            // Check headers on first two lines
            let headers = lines[0].split('\t');
            let artIdx = headers.indexOf("Artist"), albIdx = headers.indexOf("Album");
            let dataStart = 1;

            if (artIdx === -1 || albIdx === -1) {
                headers = lines[1].split('\t');
                artIdx = headers.indexOf("Artist");
                albIdx = headers.indexOf("Album");
                dataStart = 2;
            }

            if (artIdx === -1) { 
                this.setStatus("Error: Could not find 'Artist' and 'Album' columns."); 
                this.elements.syncBtn.disabled = false;
                return; 
            }
            
            const toFetch = [];
            for (let i = dataStart; i < lines.length; i++) {
                const col = lines[i].split('\t');
                const art = col[artIdx], alb = col[albIdx];
                if (art && alb && !this.db.some(x => x.artist.toLowerCase() === art.toLowerCase() && x.title.toLowerCase() === alb.toLowerCase())) {
                    toFetch.push({ artist: art, title: alb });
                }
            }

            if (toFetch.length === 0) {
                this.setStatus("Collection is up to date.");
                this.elements.syncBtn.disabled = false;
                return;
            }

            this.setStatus(`Syncing ${toFetch.length} new albums...`);
            for (let i = 0; i < toFetch.length; i++) {
                this.setStatus(`Processing ${i+1}/${toFetch.length}: ${toFetch[i].title}`);
                await this.findAndAddAlbum(toFetch[i].artist, toFetch[i].title);
            }
            
            this.setStatus("Sync Complete!");
        } catch (e) { 
            this.setStatus("Sync failed. Ensure your sheet is 'Published to Web' as TSV."); 
        }
        this.elements.syncBtn.disabled = false;
    },

    async findAndAddAlbum(artist, title) {
        try {
            const data = await api.searchRelease(artist, title);
            if (!data.releases?.length) return false;
            const rel = data.releases[0];
            const [img, details] = await Promise.all([api.fetchCoverArtUrl(rel.id), api.fetchDetails(rel.id)]);
            
            const tracks = [];
            details.media?.[0]?.tracks?.forEach(t => tracks.push({ title: t.title }));

            this.db.push({
                id: rel.id, artist: rel['artist-credit'][0].name, title: rel.title,
                date: rel.date, img: img, tracks: tracks
            });
            this.sortDB();
            this.savePersistentData();
            this.renderGrid();
            return true;
        } catch (e) { return false; }
    },

    async barcodeSearch() {
        const bc = this.elements.barcodeInput.value.trim();
        if (!bc) return;
        this.setStatus("Scanning barcode...");
        const data = await api.searchByBarcode(bc);
        if (data.releases?.length) {
            const r = data.releases[0];
            await this.findAndAddAlbum(r['artist-credit'][0].name, r.title);
            this.elements.barcodeInput.value = '';
            this.setStatus("Added from barcode.");
        } else { this.setStatus("Barcode not found."); }
    },

    async manualSearch() {
        const art = this.elements.artistInput.value.trim();
        const alb = this.elements.albumInput.value.trim();
        if (!art) return;
        if (alb) {
            await this.findAndAddAlbum(art, alb);
            this.elements.artistInput.value = this.elements.albumInput.value = '';
        } else {
            this.showArtistPicker(art);
        }
    },

    async showArtistPicker(name) {
        const list = document.getElementById('modalAlbumList');
        list.innerHTML = 'Searching MusicBrainz...';
        this.elements.albumSelectModal.style.display = 'flex';
        const data = await api.searchByArtist(name);
        list.innerHTML = '';
        data.releases?.forEach(r => {
            const row = document.createElement('div');
            row.style = "display:flex; justify-content:space-between; align-items:center; background:#222; padding:10px; border-radius:5px;";
            row.innerHTML = `<div><b>${r.title}</b><br><small>${r.date || ''}</small></div>`;
            const btn = document.createElement('button');
            btn.textContent = 'Add';
            btn.onclick = async () => {
                btn.disabled = true;
                await this.findAndAddAlbum(name, r.title);
                btn.textContent = 'Added';
            };
            row.appendChild(btn);
            list.appendChild(row);
        });
    },

    async showImageUpdater() {
        const alb = this.db[this.selectedIdx];
        const grid = document.getElementById('modalImageGrid');
        grid.innerHTML = 'Finding images...';
        this.elements.imageModal.style.display = 'flex';

        const [caa, itunes] = await Promise.allSettled([api.fetchImages(alb.id), api.searchItunes(alb.artist, alb.title)]);
        grid.innerHTML = '';

        const images = [];
        if (caa.value?.images) caa.value.images.forEach(i => images.push(i.image));
        if (itunes.value?.results) itunes.value.results.forEach(r => images.push(r.artworkUrl100.replace('100x100', '1000x1000')));

        [...new Set(images)].forEach(url => {
            const item = document.createElement('div');
            item.className = 'modal-image-item';
            item.innerHTML = `<img src="${url}"><p>...</p>`;
            item.onclick = () => { alb.img = url; this.savePersistentData(); this.closeModals(); this.renderGrid(); };
            grid.appendChild(item);
            
            const i = new Image();
            i.onload = () => item.querySelector('p').textContent = `${i.naturalWidth}x${i.naturalHeight}`;
            i.src = url;
        });
    },

    exportDB() {
        const blob = new Blob([JSON.stringify(this.db, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = 'cd_collection.json'; a.click();
        this.isDirty = false;
        this.elements.exportBtn.classList.remove('needs-save');
    },

    handleJSONUpload(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { 
            this.db = JSON.parse(ev.target.result); 
            this.sortDB(); 
            this.savePersistentData(); 
            this.renderGrid(); 
            this.isDirty = false;
            this.elements.exportBtn.classList.remove('needs-save');
        };
        reader.readAsText(e.target.files[0]);
    },

    populateAZNav() {
        const nav = document.getElementById('az-breadcrumb');
        nav.innerHTML = '';
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ#".split('').forEach(l => {
            const s = document.createElement('span');
            s.className = 'az-letter'; s.textContent = l;
            s.onclick = () => this.jumpTo(l);
            nav.appendChild(s);
        });
    },

    jumpTo(l) {
        const i = this.db.findIndex(x => l === '#' ? !/^[A-Z]/i.test(x.artist) : x.artist.toUpperCase().startsWith(l));
        if (i > -1) {
            this.elements.grid.children[i].scrollIntoView({ behavior: 'smooth' });
            this.selectAlbum(i);
        }
    },

    closeModals() {
        this.elements.imageModal.style.display = 'none';
        this.elements.albumSelectModal.style.display = 'none';
    }
};

window.onload = () => app.init();
</script>
</body>
</html>
